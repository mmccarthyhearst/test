services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_sdr
      POSTGRES_USER: ai_sdr
      POSTGRES_PASSWORD: ai_sdr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_sdr"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn ai_sdr.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_sdr:ai_sdr@postgres:5432/ai_sdr
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  dashboard:
    build: .
    command: streamlit run src/ai_sdr/ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_sdr:ai_sdr@postgres:5432/ai_sdr
      REDIS_URL: redis://redis:6379/0
      API_BASE_URL: http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
